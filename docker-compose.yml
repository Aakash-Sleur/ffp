version: "3.8"

services:
  api:
    build:
      context: https://github.com/seovimalraj/ffp.git#main
      dockerfile: apps/api/Dockerfile
    container_name: ffp-api
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001

      # Required Frontend URL
      FRONTEND_URL: https://app.frigate.ai

      # Supabase Configuration
      SUPABASE_URL: https://supabase.frigate.ai
      SUPABASE_STORAGE_BUCKET: cad-files

      # JWT Configuration
      JWT_EXPIRES_IN: 7d

      # Service URLs
      CAD_SERVICE_URL: http://cad-service:10001
      WORKFLOW_SERVICE_URL: http://ffp-workflow.frigate.ai/api/inngest
      APP_URL: https://app.frigate.ai
      ALLOWED_ORIGINS: https://app.frigate.ai,https://ffp-web.frigate.ai,https://ffp-api.frigate.ai,https://ffp-cad.frigate.ai,https://dokploy.frigate.ai,http://ffp-workflow.frigate.ai,http://ffp.inngest.frigate.ai

      # File Upload Settings
      MAX_FILE_SIZE: 100MB
      ALLOWED_FILE_TYPES: .step,.stp,.stl,.iges,.igs,.obj
    labels:
      # Subdomain access
      - "traefik.enable=true"
      - "traefik.http.routers.ffp-api.rule=Host(`ffp-api.frigate.ai`)"
      - "traefik.http.routers.ffp-api.entrypoints=websecure"
      - "traefik.http.routers.ffp-api.tls.certresolver=letsencrypt"

      - "traefik.http.services.ffp-api.loadbalancer.server.port=3001"
    networks:
      - dokploy-network
    restart: unless-stopped

  cad-service:
    build:
      context: https://github.com/seovimalraj/ffp.git#main
      dockerfile: apps/cad-service/Dockerfile
    container_name: ffp-cad-service
    env_file: .env
    environment:
      PYTHONUNBUFFERED: 1
      PORT: 10001

      # Processing Settings
      MAX_FILE_SIZE: 100MB
      TEMP_DIR: /tmp/cad-uploads
      PROCESSING_TIMEOUT: 300

      # Security
      CORS_ORIGINS: https://app.frigate.ai,https://ffp-web.frigate.ai,https://ffp-api.frigate.ai,https://ffp-cad.frigate.ai,https://dokploy.frigate.ai,http://ffp-workflow.frigate.ai,http://ffp.inngest.frigate.ai
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ffp-cad.rule=Host(`ffp-cad.frigate.ai`)"
      - "traefik.http.routers.ffp-cad.entrypoints=websecure"
      - "traefik.http.routers.ffp-cad.tls.certresolver=letsencrypt"
      - "traefik.http.services.ffp-cad.loadbalancer.server.port=10001"
    networks:
      - dokploy-network
    restart: unless-stopped

  workflow:
    build:
      context: https://github.com/seovimalraj/ffp.git#main
      dockerfile: apps/workflow-service/Dockerfile
    container_name: ffp-workflow
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3004
      FRONTEND_URL: "https://app.frigate.ai"

      # Other
      VERIFIER_EMAIL: vimalraj@frigate.ai
      ALLOWED_ORIGINS: "https://ffp-inngest.frigate.ai,https://app.frigate.ai,https://ffp-api.frigate.ai,http://ffp-workflow.frigate.ai,http://ffp.inngest.frigate.ai"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ffp-workflow.rule=Host(`ffp-workflow.frigate.ai`)"
      - "traefik.http.routers.ffp-workflow.entrypoints=websecure"
      - "traefik.http.routers.ffp-workflow.tls.certresolver=letsencrypt"
      - "traefik.http.services.ffp-workflow.loadbalancer.server.port=3004"
    networks:
      - dokploy-network
    restart: unless-stopped

  web:
    build:
      context: https://github.com/seovimalraj/ffp.git#main
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://app.frigate.ai/api
    container_name: ffp-web
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: https://app.frigate.ai/api
    labels:
      # Subdomain access
      - "traefik.enable=true"
      - "traefik.http.routers.ffp-web.rule=Host(`ffp-web.frigate.ai`)"
      - "traefik.http.routers.ffp-web.entrypoints=websecure"
      - "traefik.http.routers.ffp-web.tls.certresolver=letsencrypt"
      # Combined URL - app.frigate.ai (root and all other paths)
      - "traefik.http.routers.ffp-web-combined.rule=Host(`app.frigate.ai`)"
      - "traefik.http.routers.ffp-web-combined.entrypoints=websecure"
      - "traefik.http.routers.ffp-web-combined.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ffp-web-combined.priority=1"
      - "traefik.http.services.ffp-web.loadbalancer.server.port=3000"
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
